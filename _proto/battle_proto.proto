    NORMAL_LEAVE = 1;
    HIGH_VALUE_OWNER_LEAVE = 2;
  }
  uint32 player_uin = 1;
  Next.ZoneBattleRoleLeaveNotify.LeaveType reason = 2;
  uint32 seq_num = 3;
}


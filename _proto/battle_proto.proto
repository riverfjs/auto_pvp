  repeated Next.BattleRoundFlowReq req = 2;
  bool is_confirm = 4;
  int32 wl_req_id = 5;
  int32 max_err_req_id = 6;
  string feature_data = 7;
}

message ZoneBattleCmdPushbackRsp {
  Next.RetInfo ret_info = 1;
  bool is_caught = 2;
  uint32 catch_probability = 4;
  repeated Next.Inner_FriendTypeInfo fri_type_list = 5;
  bool has_npc_delay = 7;
  uint32 state_ret_code = 9;
  Next.BattleSyncData sync_data = 10;
  Next.BattleRoundFlowReq req = 11;
  Next.BattleRoleMagicOpInfo magic_op_info = 12;
  uint32 combo_skill_idx = 20;
  uint32 wl_req_id = 21;
  uint32 max_err_req_id = 22;
  bool ignored = 23;
  int32 round = 30;
}

message ZoneBattleRoundFlowFinishReq {
  repeated Next.PetPosition pos_info = 1;
  Next.Position battle_center = 2;
  uint32 battle_radius = 3;
  Next.BATTLEFIELD_STATE state = 4;
  uint32 seq_num = 5;
}

message ZoneBattleRoundFlowFinishRsp {
  Next.RetInfo ret_info = 1;
  bool is_finish = 2;
}

message ZoneBattleEnterNotify {
  uint32 battle_mode = 1;
  int32 round = 2;
  uint32 series_index = 3;
  uint64 round_time = 4;
  Next.BattleInitInfo init_info = 6;
  Next.Point avatar_pt = 7;
  Next.Point npc_pt = 8;
  repeated uint64 npc_id = 9;
  bool is_reconnect = 10;
  uint32 enter_battle_type = 11;
  Next.Position battle_center = 12;
  uint32 weather_id = 13;
  uint32 weather_expire_round = 19;
  uint32 water_battle_type = 14;
  int32 max_round = 15;
  int32 rotate = 16;
  uint32 creater_uin = 17;
  uint32 data_seq_num = 18;
}

message ZoneBattlePrePlayNotify {
  Next.BattlePerformCmd perform_cmd = 1;
  Next.BattleRoundSettleInfo settle_info = 2;
}

message ZoneBattleRoundStartNotify {
  Next.BATTLE_STATE_NOTIFY_TYPE state_type = 1;
  Next.BattleStateInfo state_info = 2;
  Next.BattlePerformCmd perform_cmd = 3;
  Next.AiExtraData ai_extra_data = 4;

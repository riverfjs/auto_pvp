    RANDOM_PET = 1;
    WEEKEND_WELFARE = 2;
  }
  uint32 extra_obtain_pvp_score_source = 1;
}

message ZoneBattleFinishNotify {
  Next.BattleSettleInfo settle_info = 1;
  repeated uint32 seen_monster_id = 3;
  Next.RetInfo ret_info = 4;
  Next.GoodsReward reward = 5;
  bool evolution_complete = 7;
  repeated Next.BattleFinishPetInfo pet_info = 8;
  repeated Next.BattleFinishBagInfo bag_info = 9;
  bool will_leave_visit = 10;
  repeated Next.PetCarryonInfo consumed_carryons = 12;
  repeated Next.PvpScoreRecord pvp_score_records = 13;
  int32 pvp_score = 14;
  Next.PlayerAppearanceInfo_FashionInfo_SuitInfo fashion_suit_info = 15;
  int32 total_pvp_score = 17;
  int32 max_pvp_score = 18;
  repeated int32 world_nums = 19;
  repeated Next.CliSimpleBattlePet simple_pets = 21;
  Next.PvpRankSettleInfo pvp_rank_settle_info = 22;
  int32 create_battle_ret = 23;
  int32 cli_startup_channel = 24;
  int32 last_pvp_battle_type = 25;
  string last_pvp_battle_ai_desc = 26;
  repeated Next.ObserverPvpScoreRecord observer_pvp_score_records = 27;
  Next.BattleFinishObtainMedalInfo obtain_medal_info = 28;
  Next.BattlePvpScoreInfo battle_pvp_score = 29;
}

